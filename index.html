<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map for employees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400&family=Fira+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #626b51;
      --primary-dark: #4f5642;
      --primary-light: #7a8466;
      --surface: #f6f5f1;
      --surface-elevated: #ffffff;
      --text: #2a2d26;
      --text-on-primary: #f8f7f4;
      --border: #d8d9d2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Fira Sans", system-ui, sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.5rem;
      background: var(--primary);
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(42, 45, 38, 0.12);
    }

    header h1 {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.65rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-on-primary);
      line-height: 1;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 1rem 1.5rem 1.5rem;
    }

    .map-viewer {
      flex: 1;
      min-height: 0;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: auto;
      box-shadow: 0 4px 24px rgba(42, 45, 38, 0.08);
      -webkit-overflow-scrolling: touch;
    }

    .map-stage {
      position: relative;
      width: 100%;
      margin: 0 auto;
    }

    .map-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .map-links {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .map-links a {
      position: absolute;
      pointer-events: auto;
      background: transparent;
      border-radius: 2px;
      transition: background 0.15s, outline 0.15s;
    }

    .map-links a:hover,
    .map-links a:focus-visible {
      outline: 2px solid rgba(98, 107, 81, 0.55);
      background: rgba(98, 107, 81, 0.12);
    }

    .map-links a:focus-visible {
      outline-offset: 1px;
    }

    @media (max-width: 600px) {
      header {
        padding: 1rem;
      }

      header h1 {
        font-size: 1.4rem;
      }

      main {
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Map for employees</h1>
  </header>

  <main>
    <div class="map-viewer">
      <div class="map-stage" id="map-stage">
        <img class="map-svg" src="map.svg" alt="Andermatt destination map" width="978" height="1389">
        <div class="map-links" id="map-links" aria-hidden="true"></div>
      </div>
    </div>
  </main>

  <script id="map-link-data" type="application/json">
    {"width":977.953,"height":1388.98,"links":[]}
  </script>
  <script>
    function loadMapLinks() {
      const container = document.getElementById("map-links");
      const data = JSON.parse(document.getElementById("map-link-data").textContent);

      for (const link of data.links) {
        const anchor = document.createElement("a");
        anchor.href = link.href;
        anchor.target = link.href.startsWith("#") ? "_self" : "_blank";
        anchor.rel = "noopener noreferrer";
        anchor.style.left = `${link.left}%`;
        anchor.style.top = `${link.top}%`;
        anchor.style.width = `${link.width}%`;
        anchor.style.height = `${link.height}%`;

        if (link.title) {
          anchor.title = link.title;
          anchor.setAttribute("aria-label", link.title);
        }

        container.appendChild(anchor);
      }

      if (data.links.length > 0) {
        container.removeAttribute("aria-hidden");
      }
    }

    loadMapLinks();
  </script>
</body>
</html>
