<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map for employees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400&family=Fira+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #626b51;
      --primary-dark: #4f5642;
      --primary-light: #7a8466;
      --surface: #f6f5f1;
      --surface-elevated: #ffffff;
      --text: #2a2d26;
      --text-on-primary: #f8f7f4;
      --border: #d8d9d2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Fira Sans", system-ui, sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.5rem;
      background: var(--primary);
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(42, 45, 38, 0.12);
    }

    header h1 {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.65rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-on-primary);
      line-height: 1;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 1rem 1.5rem 1.5rem;
    }

    .pdf-container {
      flex: 1;
      position: relative;
      min-height: 0;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(42, 45, 38, 0.08);
    }

    .pdf-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    .fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      height: 100%;
      padding: 2rem;
      text-align: center;
      color: var(--primary-light);
      font-family: "Fira Sans", sans-serif;
    }

    .fallback p {
      max-width: 28rem;
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      header {
        padding: 1rem;
      }

      header h1 {
        font-size: 1.4rem;
      }

      main {
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Map for employees</h1>
  </header>

  <main>
    <div class="pdf-container">
      <iframe
        id="pdf-viewer"
        src="map.pdf"
        title="PDF Dokument"
      ></iframe>
      <noscript>
        <div class="fallback" style="display: flex;">
          <p>JavaScript ist deaktiviert. Bitte öffne die PDF direkt.</p>
        </div>
      </noscript>
    </div>
  </main>

  <script>
    document.getElementById("pdf-viewer").src = "map.pdf";
  </script>
</body>
</html>
